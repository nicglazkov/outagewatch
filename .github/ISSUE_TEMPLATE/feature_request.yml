name: Feature request
description: Suggest an idea or improvement for OutageWatch
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem you're trying to solve,
        not just the solution, so we can consider the best fit.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what's getting in the way today?
      placeholder: "I want to ... but currently ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about, if any.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Mockups, examples from other apps, or extra context.
    validations:
      required: false
